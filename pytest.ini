[pytest]
testpaths = tests
python_files = test_*.py *_test.py [0-9][0-9]_test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: fast integration tests
    stress: slow throughput and scale benchmarks
    tier1: basic functionality
    tier2: general functionality
    tier3: advanced functionality
    tier4: impossible limits
addopts = -ra -q --tb=short
filterwarnings =
    ignore::DeprecationWarning
